<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>牌谱统计 viewer</title>
<style>
  :root {
    --bg: #0f1419;
    --panel: #1a2128;
    --fg: #e6edf3;
    --muted: #8b949e;
    --accent: #58a6ff;
    --good: #3fb950;
    --bad: #f85149;
    --border: #30363d;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--fg);
    font: 14px/1.55 -apple-system, BlinkMacSystemFont, "PingFang SC",
          "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  }
  .wrap { max-width: 1280px; margin: 0 auto; padding: 24px 20px 60px; }
  h1 { margin: 0 0 6px; font-size: 20px; }
  .sub { color: var(--muted); font-size: 12px; margin-bottom: 20px; }
  h2 { margin: 28px 0 10px; font-size: 15px; border-left: 3px solid var(--accent); padding-left: 10px; }

  .toolbar {
    display: flex; flex-wrap: wrap; gap: 10px 14px; align-items: center;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 6px; padding: 12px 14px; margin-bottom: 14px;
  }
  .toolbar label { color: var(--muted); font-size: 12px; }
  select, button, input[type="file"]::file-selector-button {
    background: #0d1117; color: var(--fg); border: 1px solid var(--border);
    border-radius: 4px; padding: 5px 10px; font: inherit; cursor: pointer;
  }
  select { min-width: 160px; }
  button:hover, select:hover { border-color: var(--accent); }
  button.toggle { background: rgba(88,166,255,0.15); border-color: var(--accent); color: var(--accent); }
  .spacer { flex: 1; }
  .meta-info { color: var(--muted); font-size: 12px; }

  .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 6px; overflow: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
  th, td { padding: 7px 9px; text-align: right; border-bottom: 1px solid var(--border); white-space: nowrap; }
  th { color: var(--muted); font-weight: 500; background: var(--panel); position: sticky; top: 0; z-index: 1; }
  th.sortable { cursor: pointer; user-select: none; }
  th.sortable:hover { color: var(--fg); }
  th.sortable.active { color: var(--accent); }
  th.sortable .arrow { display: inline-block; width: 10px; opacity: 0.5; margin-left: 2px; }
  th.sortable.active .arrow { opacity: 1; }
  td:first-child, th:first-child { text-align: left; position: sticky; left: 0; background: var(--panel); }
  tr:hover td { background: rgba(88, 166, 255, 0.05); }
  tr:hover td:first-child { background: var(--panel); }
  .pos { color: var(--good); }
  .neg { color: var(--bad); }
  .dim { color: var(--muted); }
  .empty { color: var(--muted); padding: 30px; text-align: center; }
</style>
</head>
<body>
<div class="wrap">
  <h1>牌谱统计 viewer</h1>
  <div class="sub">支持两种输入：① 原始天凤格式牌谱 <code>data/games/*.json</code>（可多选） ② <code>report.py</code> 生成的 <code>report.json</code>。前端实时解析+聚合，无需后端。</div>

  <div class="toolbar">
    <label>数据文件</label>
    <input type="file" id="file" accept=".json,application/json" multiple>
    <button id="export-btn" style="display:none">导出 report.json</button>
    <span class="meta-info" id="loaded">未加载</span>
  </div>

  <div class="toolbar" id="filters" style="display:none">
    <label>牌谱</label>
    <select id="game-sel"><option value="__all__">全部</option></select>
    <label>玩家</label>
    <select id="player-sel"><option value="__all__">全部</option></select>
    <label>显示</label>
    <button id="mode-btn" class="toggle">次数</button>
    <span class="spacer"></span>
    <span class="meta-info" id="scope"></span>
  </div>

  <div id="content" style="display:none">
    <h2>总览</h2>
    <div class="panel"><table id="overview"></table></div>

    <h2>番型 <span class="meta-info" style="font-weight:400;font-size:12px">
      排序
      <select id="yaku-sort" style="margin-left:6px">
        <option value="appearance">出现先后</option>
        <option value="ratio">占比最大</option>
        <option value="name">役名字典序</option>
      </select>
    </span></h2>
    <div class="panel"><table id="yaku"></table></div>
  </div>

  <div id="placeholder" class="empty">先选择 data/games/*.json 或 report.json 文件（可多选）</div>
</div>

<script>
(function () {
  // ============================================================
  // 前端等价于 src/parser/{localize,tenhou,tiles}.py + src/reporter/datafile.py
  // 让用户直接拖原始 data/games/*.json 进来就能看统计，零环境。
  // 改任一映射/解析逻辑时，要确保 Python 端同步——或者让 Python 端也走前端这一份。
  // ============================================================

  // ---- localize ----
  // 与 src/parser/localize.py 同义：日文 -> 简体。按 key 长度降序替换。
  const LOCALIZE_TABLE = (() => {
    const tables = [
      // 主役名
      { "門前清自摸和": "门清自摸", "立直": "立直", "槍槓": "抢杠", "嶺上開花": "岭上开花",
        "海底摸月": "海底摸月", "河底撈魚": "河底捞鱼",
        "役牌 白": "役牌 白", "役牌 發": "役牌 发", "役牌 中": "役牌 中",
        "役牌:自風牌": "役牌:自风", "役牌:場風牌": "役牌:场风",
        "断幺九": "断幺九", "一盃口": "一杯口", "平和": "平和",
        "混全帯幺九": "混全带幺九", "一気通貫": "一气通贯", "三色同順": "三色同顺",
        "ダブル立直": "双立直", "三色同刻": "三色同刻", "三槓子": "三杠子",
        "対々和": "对对和", "三暗刻": "三暗刻", "小三元": "小三元",
        "混老頭": "混老头", "七対子": "七对子", "純全帯幺九": "纯全带幺九",
        "混一色": "混一色", "二盃口": "二杯口", "清一色": "清一色",
        "一発": "一发", "赤ドラ": "赤宝牌", "裏ドラ": "里宝牌",
        "抜きドラ": "拔北宝牌", "ドラ": "宝牌",
        "天和": "天和", "地和": "地和", "大三元": "大三元",
        "四暗刻単騎": "四暗刻单骑", "四暗刻": "四暗刻",
        "字一色": "字一色", "緑一色": "绿一色", "清老頭": "清老头",
        "国士無双十三面待ち": "国士无双十三面", "国士無双": "国士无双",
        "小四喜": "小四喜", "四槓子": "四杠子",
        "純正九蓮宝燈": "纯正九莲宝灯", "九蓮宝燈": "九莲宝灯",
        "八連荘": "八连庄", "大四喜": "大四喜",
        "燕返し": "燕返", "槓振り": "杠振", "十二落抬": "十二落抬",
        "五門斉": "五门齐", "三連刻": "三连刻", "一色三順": "一色三顺",
        "一筒摸月": "一筒摸月", "九筒撈魚": "九筒捞鱼", "人和": "人和",
        "大車輪": "大车轮", "大竹林": "大竹林", "大数隣": "大数邻",
        "石の上にも三年": "石上三年", "大七星": "大七星" },
      // 打点级别
      { "切り上げ満貫": "切上满贯", "流し満貫": "流满", "三倍満": "三倍满",
        "役満": "役满", "満貫": "满贯", "跳満": "跳满", "倍満": "倍满" },
      // 终局 tag
      { "和了": "和了", "流局": "流局", "四開槓": "四开杠", "三家和": "三家和",
        "九種九牌": "九种九牌", "四風連打": "四风连打", "四家立直": "四家立直" },
      // 段位
      { "初心": "初心", "雀士": "雀士", "雀傑": "雀杰", "雀豪": "雀豪",
        "雀聖": "雀圣", "魂天": "魂天" },
      // 规则展示串
      { "段位戦": "段位战", "友人戦": "友人战", "大会戦": "大会战",
        "東喰": "东·副露", "南喰": "南·副露", "東": "东", "南": "南", "喰": "副露" },
      // 通用
      { "飜": "番", "點": "点" },
    ];
    const merged = Object.assign({}, ...tables);
    return Object.entries(merged).sort((a, b) => b[0].length - a[0].length);
  })();

  function localize(s) {
    if (typeof s !== "string") return s;
    let r = s;
    for (const [from, to] of LOCALIZE_TABLE) {
      if (r.includes(from)) r = r.split(from).join(to);
    }
    return r;
  }

  const YAKU_LINE = /^(.+?)\((\d+)飜\)$/;

  function parseYakuEntries(yakuStrs) {
    const out = [];
    for (let i = 1; i < yakuStrs.length; i++) {
      const raw = yakuStrs[i];
      if (typeof raw !== "string") continue;
      const m = raw.match(YAKU_LINE);
      if (m) out.push({ name: localize(m[1]), han: parseInt(m[2], 10) });
      else out.push({ name: localize(raw), han: 0 });
    }
    return out;
  }

  function totalHan(yakuStrs) {
    // 等价 src/parser/localize.py:total_han — 跳过 yaku[0]（总打点串），其余累计 (X番)
    let n = 0;
    for (let i = 1; i < yakuStrs.length; i++) {
      const y = yakuStrs[i];
      if (typeof y !== "string") continue;
      const matches = localize(y).matchAll(/(\d+)番/g);
      for (const m of matches) n += parseInt(m[1], 10);
    }
    return n;
  }

  const SCORE_CLASS_KEYS = ["役满", "三倍满", "倍满", "跳满", "切上满贯", "满贯", "流满"];

  function detectScoreClass(yakuStrs) {
    const joined = yakuStrs.filter(s => typeof s === "string").map(localize).join(" ");
    for (const k of SCORE_CLASS_KEYS) if (joined.includes(k)) return k;
    return null;
  }

  // ---- tiles ----
  // 等价 src/parser/tiles.py。draws/discards 里的字符串元素若以 c/p/m/k/a/f 含字母则是鸣牌串。
  const CALL_PREFIXES = "cpmkaf";

  function isCallStr(x) {
    return typeof x === "string" && [...x].some(ch => CALL_PREFIXES.includes(ch));
  }

  function callType(x) {
    if (x.startsWith("c")) return "chi";
    if (x.startsWith("p") || (x.includes("p") && !x.includes("k") && !x.includes("a"))) return "pon";
    if (x.includes("m")) return "daiminkan";
    if (x.includes("k")) return "kakan";
    if (x.includes("a")) return "ankan";
    if (x.includes("f")) return "kita";
    return "unknown";
  }

  function isRiichiDiscard(x) {
    return typeof x === "string" && x.startsWith("r");
  }

  // ---- tenhou parser ----
  // 等价 src/parser/tenhou.py。
  const ROUND_WIND = { 0: "东", 1: "南", 2: "西", 3: "北" };

  function roundName(code) {
    const wind = ROUND_WIND[Math.floor(code / 4)];
    const ju = (code % 4) + 1;
    return `${wind}${ju}局`;
  }

  function parseEnding(end) {
    if (!end || !end.length) return { type: "unknown" };
    const tag = end[0];
    if (tag === "和了") {
      const agaris = [];
      for (let i = 1; i < end.length; i += 2) {
        const delta = end[i];
        const detail = end[i + 1] || [];
        const who = detail[0] ?? null;
        const frm = detail[1] ?? null;
        const yaku = detail.slice(3);
        agaris.push({
          delta, who, from: frm,
          tsumo: who === frm,
          yaku,
          score_class: detectScoreClass(yaku),
          han: totalHan(yaku),
        });
      }
      return { type: "和了", agaris };
    }
    if (tag === "流局" || tag === "流し満貫" || tag === "流し満貝" || tag === "流し満贯") {
      return { type: "流局", delta: end[1] || [0, 0, 0, 0] };
    }
    // 中途流局: 九種九牌 / 四風連打 / 四開槓 / 三家和 / 四家立直
    return { type: "中途流局", reason: tag, delta: [0, 0, 0, 0] };
  }

  function parseRound(raw, nplayers) {
    const code = raw[0][0];
    const players = [];
    for (let seat = 0; seat < nplayers; seat++) {
      const base = 4 + seat * 3;
      const draws = raw[base + 1] || [];
      const discards = raw[base + 2] || [];
      const riichi = discards.some(isRiichiDiscard);
      const calls = [];
      for (const x of draws) if (isCallStr(x)) calls.push(callType(x));
      for (const x of discards) if (isCallStr(x)) calls.push(callType(x));
      const fulu = calls.filter(c => c === "chi" || c === "pon" || c === "daiminkan" || c === "kakan");
      players.push({
        seat, riichi, calls,
        fulu_count: fulu.length,
        menzen: fulu.length === 0,
      });
    }

    const ending = parseEnding(raw.length > 16 ? raw[16] : null);

    // 回填 riichi_outcome, 同 src/parser/tenhou.py
    for (const p of players) {
      if (!p.riichi) { p.riichi_outcome = "none"; continue; }
      let outcome = "other";
      if (ending.type === "和了") {
        for (const a of ending.agaris) {
          if (a.who === p.seat) { outcome = "won"; break; }
          if (!a.tsumo && a.from === p.seat) { outcome = "dealin"; break; }
        }
      } else if (ending.type === "流局") {
        const d = ending.delta || [];
        outcome = (p.seat < d.length && d[p.seat] > 0) ? "draw_tenpai" : "draw_noten";
      }
      p.riichi_outcome = outcome;
    }

    return {
      round_code: code,
      round_name: roundName(code),
      honba: raw[0][1],
      kyoutaku: raw[0][2],
      dealer_seat: code % 4,
      players,
      ending,
    };
  }

  function parseGame(data) {
    const names = data.name || ["", "", "", ""];
    const nplayers = (names.length >= 4 && names[3] === "") ? 3 : 4;
    const sc = data.sc || [];
    const final = [];
    for (let seat = 0; seat < 4; seat++) {
      if (2 * seat + 1 < sc.length) {
        final.push({ seat, point: sc[2 * seat], score_delta: sc[2 * seat + 1] });
      }
    }
    const rounds = (data.log || []).map(r => parseRound(r, nplayers));
    return {
      ref: data.ref,
      rule: data.rule || {},
      title: data.title || [],
      names, nplayers, final, rounds,
    };
  }

  // ---- datafile builder ----
  // 等价 src/reporter/datafile.py
  function placementOf(final) {
    const ranked = [...final].sort((a, b) => b.point - a.point);
    const out = {};
    ranked.forEach((f, i) => { out[f.seat] = i + 1; });
    return out;
  }

  function roundDeltas(ending, nplayers) {
    const d = new Array(nplayers).fill(0);
    if (ending.type === "和了") {
      for (const a of ending.agaris) {
        const ad = a.delta || [];
        for (let i = 0; i < Math.min(nplayers, ad.length); i++) d[i] += ad[i];
      }
    } else if (ending.type === "流局") {
      const ed = ending.delta || [];
      for (let i = 0; i < Math.min(nplayers, ed.length); i++) d[i] += ed[i];
    }
    return d;
  }

  function buildReport(games) {
    const ordered = [...games].sort((a, b) => (a.ref || "").localeCompare(b.ref || ""));
    const outGames = ordered.map((g, idx) => {
      const ref = g.ref || "";
      const refPrefix = ref.split("-")[0] || "";
      const label = refPrefix ? `#${idx + 1} ${refPrefix}` : `#${idx + 1}`;
      const placeOf = placementOf(g.final);
      const final = g.final.map(f => ({
        seat: f.seat,
        name: g.names[f.seat],
        point: f.point,
        score_delta: f.score_delta,
        placement: placeOf[f.seat],
      }));
      const rounds = g.rounds.map(r => {
        const deltas = roundDeltas(r.ending, g.nplayers);
        const players = r.players.map(p => ({
          seat: p.seat,
          name: g.names[p.seat],
          is_dealer: p.seat === r.dealer_seat,
          riichi: p.riichi,
          fulu_count: p.fulu_count,
          menzen: p.menzen,
          riichi_outcome: p.riichi_outcome,
          delta: p.seat < deltas.length ? deltas[p.seat] : 0,
        }));
        const agaris = [];
        if (r.ending.type === "和了") {
          for (const a of r.ending.agaris) {
            const who = a.who;
            const delta = a.delta || [];
            const pointWon = (who != null && who < delta.length) ? Math.max(delta[who], 0) : 0;
            agaris.push({
              who,
              who_name: who != null ? g.names[who] : null,
              from: a.from,
              from_name: a.from != null ? g.names[a.from] : null,
              tsumo: a.tsumo,
              han: a.han || 0,
              score_class: a.score_class || null,
              yaku: parseYakuEntries(a.yaku || []),
              point_won: pointWon,
            });
          }
        }
        return {
          round_name: r.round_name,
          honba: r.honba,
          dealer_seat: r.dealer_seat,
          ending_type: r.ending.type,
          ending_reason: r.ending.reason || null,
          players, agaris,
        };
      });
      return {
        ref, label,
        title: g.title,
        rule_disp: localize((g.rule || {}).disp || ""),
        names: g.names,
        nplayers: g.nplayers,
        final, rounds,
      };
    });
    return {
      schema: "mjai-reviewer/stats/v1",
      generated_at: new Date().toISOString(),
      games: outGames,
    };
  }

  // 暴露解析器到 window，方便外部脚本/对比测试调用（不影响生产功能）
  window.MJAI = { parseGame, buildReport, localize };

  // ============================================================
  // 以下是原本就有的展示层逻辑（筛选/聚合/渲染）
  // ============================================================

  let DATA = null;
  let MODE = "count"; // "count" | "ratio"
  let OVERVIEW_SORT = { col: "avg_place", dir: "asc" }; // 默认按均顺升序

  const $ = (id) => document.getElementById(id);
  const fmtPct = (x) => (x == null || isNaN(x) ? "-" : (x * 100).toFixed(1) + "%");
  const fmtNum = (x, d = 0) => (x == null || isNaN(x) ? "-" : Number(x).toFixed(d));
  const sign = (x) => (x > 0 ? "pos" : x < 0 ? "neg" : "");
  const signed = (x, d = 1) => (x == null ? "-" : (x > 0 ? "+" : "") + Number(x).toFixed(d));

  // ===== 文件加载 =====
  // 支持两种输入:
  //   (A) report.json: 已聚合过的事实表 (schema 字段为 "mjai-reviewer/stats/v1")
  //   (B) data/games/*.json: 原始天凤格式牌谱（多选时全部解析后合并）
  $("file").addEventListener("change", async (e) => {
    const files = Array.from(e.target.files || []);
    if (!files.length) return;
    try {
      const parsed = await Promise.all(files.map(readJSON));
      // 看第一个判断是哪种格式
      const isReport = parsed.length === 1 && parsed[0]?.schema?.startsWith?.("mjai-reviewer/stats/");
      if (isReport) {
        DATA = parsed[0];
        onLoaded(`${files[0].name} · ${DATA.games.length} 场牌谱`);
      } else {
        // 原始天凤 json: 跑前端解析 + datafile.build
        const games = parsed.map((d, i) => {
          if (!d.log || !d.name) {
            throw new Error(`${files[i].name} 不像天凤格式 (缺 log/name 字段)`);
          }
          return parseGame(d);
        });
        DATA = buildReport(games);
        onLoaded(`${files.length} 个原始牌谱 · ${DATA.games.length} 场（前端实时解析）`);
      }
    } catch (err) {
      console.error(err);
      alert("加载失败: " + err.message);
    }
  });

  function readJSON(f) {
    return new Promise((resolve, reject) => {
      const r = new FileReader();
      r.onload = () => { try { resolve(JSON.parse(r.result)); } catch (e) { reject(new Error(`${f.name}: ${e.message}`)); } };
      r.onerror = () => reject(new Error(`${f.name}: 读文件失败`));
      r.readAsText(f);
    });
  }

  // ===== 导出 =====
  $("export-btn").addEventListener("click", () => {
    if (!DATA) return;
    const blob = new Blob([JSON.stringify(DATA, null, 2)], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "report.json";
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 1000);
  });

  function onLoaded(metaText) {
    window.__DATA = DATA; // 调试用; 生产无害
    $("loaded").textContent = `${metaText} · 生成于 ${DATA.generated_at || "-"}`;
    $("placeholder").style.display = "none";
    $("filters").style.display = "";
    $("content").style.display = "";
    $("export-btn").style.display = "";

    // 牌谱下拉
    const gameSel = $("game-sel");
    gameSel.innerHTML = '<option value="__all__">全部 (' + DATA.games.length + " 场)</option>";
    DATA.games.forEach((g, i) => {
      const o = document.createElement("option");
      o.value = String(i);
      o.textContent = `${g.label}  ${g.rule_disp || ""}  [${g.names.filter(Boolean).join(", ")}]`;
      gameSel.appendChild(o);
    });

    // 玩家下拉(去重所有出现过的玩家名)
    const allNames = new Set();
    DATA.games.forEach((g) => g.names.forEach((n) => n && allNames.add(n)));
    const playerSel = $("player-sel");
    playerSel.innerHTML = '<option value="__all__">全部</option>';
    Array.from(allNames).sort().forEach((n) => {
      const o = document.createElement("option");
      o.value = n;
      o.textContent = n;
      playerSel.appendChild(o);
    });

    gameSel.addEventListener("change", refresh);
    playerSel.addEventListener("change", refresh);
    $("yaku-sort").addEventListener("change", refresh);
    $("mode-btn").addEventListener("click", () => {
      MODE = MODE === "count" ? "ratio" : "count";
      $("mode-btn").textContent = MODE === "count" ? "次数" : "比例";
      refresh();
    });

    refresh();
  }

  // ===== 筛选 =====
  function selectedGames() {
    const v = $("game-sel").value;
    return v === "__all__" ? DATA.games : [DATA.games[Number(v)]];
  }
  function selectedPlayer() {
    const v = $("player-sel").value;
    return v === "__all__" ? null : v;
  }

  // ===== 聚合 =====
  // 给定 games + 可选 playerFilter, 返回 {玩家名 -> 指标}
  function aggregate(games, playerFilter) {
    const stats = {};
    const get = (n) => {
      if (!stats[n]) stats[n] = blank(n);
      return stats[n];
    };

    games.forEach((g) => {
      const place_of = {};
      g.final.forEach((f) => (place_of[f.seat] = f.placement));
      // 全场顺位/收支(只有筛"全部牌谱"才计入对局数;筛单场也只有 1 场)
      g.final.forEach((f) => {
        if (playerFilter && f.name !== playerFilter) return;
        const ps = get(f.name);
        ps.games += 1;
        ps.placements[f.placement - 1] += 1;
        ps.score_balance += f.score_delta;
      });

      g.rounds.forEach((r) => {
        // 玩家粒度统计
        r.players.forEach((p) => {
          if (playerFilter && p.name !== playerFilter) return;
          const ps = get(p.name);
          ps.rounds += 1;
          if (p.is_dealer) ps.dealer_rounds += 1;
          if (p.riichi) {
            ps.reach += 1;
            ps.reach_balance += p.delta;
            const o = p.riichi_outcome;
            if (o === "won") ps.reach_won += 1;
            else if (o === "dealin") ps.reach_dealin += 1;
            else if (o === "draw_tenpai") ps.reach_draw_tenpai += 1;
            else if (o === "draw_noten") ps.reach_draw_noten += 1;
            else ps.reach_other += 1;
          }
          if (p.fulu_count > 0) ps.fulu += 1;
        });

        // 和了(从 agari 角度)
        if (r.ending_type === "和了") {
          r.agaris.forEach((a) => {
            const winner = a.who_name;
            // 和了归属者
            if (!playerFilter || winner === playerFilter) {
              if (winner) {
                const ps = get(winner);
                ps.hule += 1;
                ps.hule_point += a.point_won;
                ps.han_total += a.han;
                if (a.tsumo) ps.zimo += 1;
                if (a.score_class) ps.score_class[a.score_class] = (ps.score_class[a.score_class] || 0) + 1;
                // 是否亲和
                const wp = r.players.find((p) => p.name === winner);
                if (wp && wp.is_dealer) ps.dealer_hule += 1;
                if (wp && wp.fulu_count > 0) ps.fulu_hule += 1;
              }
            }
            // 放铳者
            if (!a.tsumo && a.from_name) {
              if (!playerFilter || a.from_name === playerFilter) {
                const fps = get(a.from_name);
                fps.fangchong += 1;
                // 失点 = round 里 from 的 delta 负值;但更直接的是 a.delta[from],未存进 viewer json,
                // 用聚合: 在该和了中 from 的失点 = -a.point_won 不准(供托/本场)。退而求其次用 round.players 的 delta累加.
                // 这里我们简单以"放铳次数"为主指标,失点用整局 from 的 delta 近似(下方在 ronComplete 里补)
              }
            }
            // 自摸时其他人被自摸
            if (a.tsumo) {
              r.players.forEach((p) => {
                if (p.name === winner) return;
                if (playerFilter && p.name !== playerFilter) return;
                const bps = get(p.name);
                bps.beizimo += 1;
              });
            }
          });

          // 用整局 player.delta 累加放铳/被自摸失点(更准)
          r.players.forEach((p) => {
            if (playerFilter && p.name !== playerFilter) return;
            const ps = get(p.name);
            // 这里粗略: 玩家本局 delta < 0 视为失点；区分放铳/被自摸需要看 agari
            // 是放铳者：找一条 agari 的 from_name == p.name
            const ronAt = r.agaris.find((a) => !a.tsumo && a.from_name === p.name);
            if (ronAt && p.delta < 0) {
              ps.fangchong_point += -p.delta;
              if (p.fulu_count > 0) ps.fulu_fangchong += 1; // 副露放铳次数
            }
            // 被自摸失点
            const isTsumoVictim = r.agaris.some((a) => a.tsumo && a.who_name !== p.name);
            if (isTsumoVictim && p.delta < 0 && !ronAt) {
              ps.beizimo_point += -p.delta;
            }
          });
        } else if (r.ending_type === "流局") {
          r.players.forEach((p) => {
            if (playerFilter && p.name !== playerFilter) return;
            const ps = get(p.name);
            ps.liuju += 1;
            if (p.delta > 0) ps.liuju_tenpai += 1;
          });
        }
      });
    });

    return stats;
  }

  function blank(name) {
    return {
      name,
      games: 0,
      placements: [0, 0, 0, 0],
      score_balance: 0,
      rounds: 0,
      dealer_rounds: 0,
      hule: 0, zimo: 0, dealer_hule: 0, hule_point: 0, han_total: 0,
      fangchong: 0, fangchong_point: 0,
      beizimo: 0, beizimo_point: 0,
      reach: 0, reach_won: 0, reach_dealin: 0, reach_draw_tenpai: 0,
      reach_draw_noten: 0, reach_other: 0, reach_balance: 0,
      fulu: 0, fulu_hule: 0, fulu_fangchong: 0,
      liuju: 0, liuju_tenpai: 0,
      score_class: {},
    };
  }

  // 番型统计: 行=役名, 列=玩家. cell = {count, ratio}
  // ratio 分母 = 该玩家总和了数(仅在该筛选范围内)
  // 同一和了里同名役只算一次出现(宝牌(2飜)+赤宝牌等)
  // 顺带记下每个役在筛选范围内的"首次出现序号",供出现先后排序用
  function aggregateYaku(games, playerFilter) {
    const yakuByPlayer = {};
    const huleByPlayer = {};
    const firstSeen = {};
    let order = 0;
    games.forEach((g) => {
      g.rounds.forEach((r) => {
        if (r.ending_type !== "和了") return;
        r.agaris.forEach((a) => {
          const w = a.who_name;
          if (!w) return;
          if (playerFilter && w !== playerFilter) return;
          huleByPlayer[w] = (huleByPlayer[w] || 0) + 1;
          if (!yakuByPlayer[w]) yakuByPlayer[w] = {};
          const seen = new Set();
          a.yaku.forEach((y) => {
            if (seen.has(y.name)) return;
            seen.add(y.name);
            yakuByPlayer[w][y.name] = (yakuByPlayer[w][y.name] || 0) + 1;
            if (!(y.name in firstSeen)) firstSeen[y.name] = order++;
          });
        });
      });
    });
    return { yaku: yakuByPlayer, hule: huleByPlayer, firstSeen };
  }

  // ===== 渲染 =====
  // 列定义: 单一来源驱动表头/排序/渲染。
  // sortVal(p, ratio): 返回排序用数值;
  // render(p, ratio): 返回 HTML 字符串。
  // 注意: 比例模式下,带分母的行为列(和了/放铳/...)排序值变成比率,与显示值一致;
  // 永远是计数的列(对局/局)和永远是均值的列(平均打点/均顺/收支)不受 ratio 影响。
  const safeR = (a, b) => (b ? a / b : 0);
  const avgPlaceOf = (p) => (p.games ? p.placements.reduce((s, c, i) => s + c * (i + 1), 0) / p.games : 0);

  const OVERVIEW_COLS = [
    { id: "name", label: "玩家",
      sortVal: (p) => p.name,
      render: (p) => escapeHTML(p.name) },
    { id: "games", label: "对局",
      sortVal: (p) => p.games,
      render: (p) => fmtNum(p.games) },
    { id: "rounds", label: "局",
      sortVal: (p) => p.rounds,
      render: (p) => fmtNum(p.rounds) },
    { id: "avg_place", label: "均顺",
      sortVal: (p) => avgPlaceOf(p) || Infinity, // 0 排末尾
      render: (p) => fmtNum(avgPlaceOf(p), 2) },
    { id: "balance", label: "收支",
      sortVal: (p) => p.score_balance,
      render: (p) => `<span class="${sign(p.score_balance)}">${signed(p.score_balance, 1)}</span>` },

    ...[0, 1, 2, 3].map((i) => ({
      id: `place${i + 1}`, label: `${i + 1}位`,
      sortVal: (p, r) => (r ? safeR(p.placements[i], p.games) : p.placements[i]),
      render: (p, r) => (r ? fmtPct(safeR(p.placements[i], p.games)) : p.placements[i]),
    })),

    ...[
      ["hule", "和了", "hule", "rounds"],
      ["zimo", "自摸(和)", "zimo", "hule"],
      ["fangchong", "放铳", "fangchong", "rounds"],
      ["beizimo", "被自摸", "beizimo", "rounds"],
      ["reach", "立直", "reach", "rounds"],
      ["fulu", "副露", "fulu", "rounds"],
      ["liuju", "流局", "liuju", "rounds"],
      ["liuju_tenpai", "流听", "liuju_tenpai", "liuju"],
      ["dealer_hule", "亲和", "dealer_hule", "dealer_rounds"],
      ["reach_won", "立直·和", "reach_won", "reach"],
      ["reach_dealin", "立直·铳", "reach_dealin", "reach"],
      ["reach_draw_tenpai", "立直·流听", "reach_draw_tenpai", "reach"],
      ["reach_draw_noten", "立直·流不听", "reach_draw_noten", "reach"],
    ].map(([id, label, num, denom]) => ({
      id, label,
      sortVal: (p, r) => (r ? safeR(p[num], p[denom]) : p[num]),
      render: (p, r) => (r ? fmtPct(safeR(p[num], p[denom])) : fmtNum(p[num])),
    })),

    { id: "avg_hule", label: "平均和了",
      sortVal: (p) => safeR(p.hule_point, p.hule),
      render: (p) => fmtNum(safeR(p.hule_point, p.hule)) },
    { id: "avg_fangchong", label: "平均放铳",
      sortVal: (p) => safeR(p.fangchong_point, p.fangchong),
      render: (p) => fmtNum(safeR(p.fangchong_point, p.fangchong)) },
    { id: "avg_beizimo", label: "平均被自摸",
      sortVal: (p) => safeR(p.beizimo_point, p.beizimo),
      render: (p) => fmtNum(safeR(p.beizimo_point, p.beizimo)) },
    { id: "reach_avg_balance", label: "立直均收",
      sortVal: (p) => (p.reach ? p.reach_balance / p.reach : 0),
      render: (p) => {
        const v = p.reach ? p.reach_balance / p.reach : null;
        return v == null ? "-" : `<span class="${sign(v)}">${signed(v, 0)}</span>`;
      } },
  ];

  function renderOverview(stats) {
    const players = Object.values(stats);
    if (!players.length) {
      $("overview").innerHTML = '<tbody><tr><td class="dim">无数据</td></tr></tbody>';
      return;
    }
    const ratio = MODE === "ratio";
    const sortCol = OVERVIEW_COLS.find((c) => c.id === OVERVIEW_SORT.col) || OVERVIEW_COLS[3];
    const dir = OVERVIEW_SORT.dir === "desc" ? -1 : 1;
    players.sort((a, b) => {
      const va = sortCol.sortVal(a, ratio);
      const vb = sortCol.sortVal(b, ratio);
      if (typeof va === "string" || typeof vb === "string") {
        return String(va).localeCompare(String(vb), "zh") * dir;
      }
      return ((va || 0) - (vb || 0)) * dir;
    });

    const arrow = (id) => {
      if (id !== OVERVIEW_SORT.col) return '<span class="arrow">↕</span>';
      return `<span class="arrow">${OVERVIEW_SORT.dir === "desc" ? "↓" : "↑"}</span>`;
    };
    const head = "<thead><tr>" + OVERVIEW_COLS.map((c) =>
      `<th class="sortable${c.id === OVERVIEW_SORT.col ? " active" : ""}" data-col="${c.id}">${c.label}${arrow(c.id)}</th>`
    ).join("") + "</tr></thead>";

    const body = "<tbody>" + players.map((p) =>
      "<tr>" + OVERVIEW_COLS.map((c) => `<td>${c.render(p, ratio)}</td>`).join("") + "</tr>"
    ).join("") + "</tbody>";

    const tbl = $("overview");
    tbl.innerHTML = head + body;
    // 委托一次性绑定
    tbl.querySelector("thead").addEventListener("click", (e) => {
      const th = e.target.closest("th.sortable");
      if (!th) return;
      const id = th.dataset.col;
      if (OVERVIEW_SORT.col === id) {
        OVERVIEW_SORT.dir = OVERVIEW_SORT.dir === "desc" ? "asc" : "desc";
      } else {
        OVERVIEW_SORT.col = id;
        // 数值列默认降序、字符串列默认升序
        const col = OVERVIEW_COLS.find((c) => c.id === id);
        const sample = col.sortVal(players[0], ratio);
        OVERVIEW_SORT.dir = typeof sample === "string" ? "asc" : "desc";
      }
      refresh();
    });
  }

  function renderYaku(yakuAgg) {
    const { yaku, hule, firstSeen } = yakuAgg;
    const players = Object.keys(yaku).sort();
    if (!players.length) {
      $("yaku").innerHTML = '<tbody><tr><td class="dim">无和了数据</td></tr></tbody>';
      return;
    }
    const allYaku = new Set();
    players.forEach((p) => Object.keys(yaku[p]).forEach((y) => allYaku.add(y)));

    const sortMode = $("yaku-sort").value;
    const maxRatio = (y) => {
      let m = 0;
      players.forEach((p) => {
        const h = hule[p] || 0;
        if (h) m = Math.max(m, (yaku[p][y] || 0) / h);
      });
      return m;
    };
    const cmp = {
      // 默认：按筛选范围内第一次出现的顺序
      appearance: (a, b) => (firstSeen[a] ?? 0) - (firstSeen[b] ?? 0),
      // 各玩家中最高占比降序，并列再按字典序
      ratio: (a, b) => (maxRatio(b) - maxRatio(a)) || a.localeCompare(b, "zh"),
      // 役名字典序(中文按拼音/笔画走 localeCompare 的 zh collation)
      name: (a, b) => a.localeCompare(b, "zh"),
    }[sortMode] || ((a, b) => 0);

    const yakuList = Array.from(allYaku).sort(cmp);

    const ratio = MODE === "ratio";
    const headerCells = ["役"].concat(players.map((p) => `${escapeHTML(p)}<div class="dim" style="font-weight:400">${hule[p]||0} 和</div>`));
    const rows = yakuList.map((y) => {
      const cells = [`<td>${escapeHTML(y)}</td>`];
      players.forEach((p) => {
        const c = yaku[p][y] || 0;
        const h = hule[p] || 0;
        if (c === 0) {
          cells.push('<td class="dim">·</td>');
        } else if (ratio) {
          cells.push(`<td>${fmtPct(c / h)}<span class="dim"> (${c})</span></td>`);
        } else {
          cells.push(`<td>${c}</td>`);
        }
      });
      return cells.join("");
    });

    $("yaku").innerHTML =
      "<thead><tr>" + headerCells.map((h) => `<th>${h}</th>`).join("") + "</tr></thead>" +
      "<tbody>" + rows.map((r) => `<tr>${r}</tr>`).join("") + "</tbody>";
  }

  function escapeHTML(s) {
    return String(s).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
  }

  function refresh() {
    const games = selectedGames();
    const player = selectedPlayer();
    const totalRounds = games.reduce((a, g) => a + g.rounds.length, 0);
    $("scope").textContent = `范围: ${games.length} 场 · ${totalRounds} 局${player ? " · 仅 " + player : ""}`;
    renderOverview(aggregate(games, player));
    renderYaku(aggregateYaku(games, player));
  }
})();
</script>
</body>
</html>
